<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Візуалізація СППР</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 40px auto;
        padding: 20px;
      }
      .result-box {
        padding: 20px;
        background-color: #f4f4f9;
        border-left: 5px solid #4caf50;
        border-radius: 5px;
        margin-bottom: 20px;
      }
      h1 {
        color: #333;
      }
      .best {
        color: #4caf50;
        font-size: 24px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>Система підтримки прийняття рішень (SAW)</h1>

    <div class="result-box">
      <div class="best" id="best-alt">Завантаження результатів...</div>
      <p id="explanation"></p>
    </div>

    <canvas id="resultsChart"></canvas>

    <script>
      fetch("/analyze")
        .then((response) => response.json())
        .then((data) => {
          document.getElementById("best-alt").innerText =
            "🏆 Найкращий вибір: " + data.best_alternative;
          document.getElementById("explanation").innerText = data.explanation;

          // Підготовка даних для графіка
          const labels = data.ranking.map((item) => item.name);
          const scores = data.ranking.map((item) => item.score);

          // Малюємо графік
          const ctx = document.getElementById("resultsChart").getContext("2d");
          new Chart(ctx, {
            type: "bar", // Тип графіка - стовпчикова діаграма
            data: {
              labels: labels,
              datasets: [
                {
                  label: "Інтегральна оцінка (від 0 до 1)",
                  data: scores,
                  backgroundColor: [
                    "rgba(76, 175, 80, 0.7)",
                    "rgba(54, 162, 235, 0.7)",
                    "rgba(255, 159, 64, 0.7)",
                  ],
                  borderColor: [
                    "rgba(76, 175, 80, 1)",
                    "rgba(54, 162, 235, 1)",
                    "rgba(255, 159, 64, 1)",
                  ],
                  borderWidth: 1,
                },
              ],
            },
            options: {
              scales: {
                y: { beginAtZero: true, max: 1 },
              },
            },
          });
        })
        .catch((error) => console.error("Помилка завантаження:", error));
    </script>
  </body>
</html>
